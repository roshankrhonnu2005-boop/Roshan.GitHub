<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Spam Email Classifier</title>
        <style>
            body{
                font-family:Arial,sans-serif;
                background:#eef2ff;
                display:flex;
                justify-content:center;
                align-items:center;
                min-height:100vh;
                margin:0;
            }
            .container{
                width:750px;
                background:#fff;
                padding:30px;
                border-radius:15px;
                box-shadow:0 0 15px rgba(0,0,0,0.1);
            }
            h1{
                text-align:center;
            }
            textarea{
                width:100%;
                height:220px;
                padding:12px;
                margin-top:15px;
                resize:none;
            }
            button{
                width:100%;
                padding:12px;
                margin-top:15px;
                background:#2563eb;
                color:#fff;
                border:none;
                border-radius:8px;
                cursor:pointer;
            }
            .result{
                margin-top:20px;
                padding:15px;
                background:#f8fafc;
                border-radius:10px;
            }
            ul{
                padding-left:20px;
            }
        </style>
    </head>
    <body>

        <div class="container">
            <h1>Spam Email Classifier</h1>

            <textarea id="emailText"
                      placeholder="Paste your email content here..."></textarea>

            <button onclick="checkEmail()">Check Email</button>

            <div class="result" id="result" style="display:none;">
                <h3 id="prediction"></h3>
                <h3 id="score"></h3>

                <h4>Suspicious Words Found</h4>
                <ul id="words"></ul>
            </div>
        </div>

        <script>
            const spamWords = [
                "free",
                "winner",
                "lottery",
                "claim now",
                "urgent",
                "offer",
                "credit card",
                "cash prize",
                "click here",
                "congratulations",
                "limited time",
                "earn money"
            ];

            function checkEmail() {
                const text =
                        document.getElementById("emailText")
                        .value.toLowerCase().trim();

                if (text === "") {
                    alert("Please enter email content.");
                    return;
                }

                let found = [];

                spamWords.forEach(word => {
                    if (text.includes(word)) {
                        found.push(word);
                    }
                });

                const percentage =
                        Math.min(found.length * 12, 100);

                const prediction =
                        percentage >= 40
                        ? "🚫 Spam Email Detected"
                        : "✅ Safe Email";

                document.getElementById("prediction")
                        .textContent = prediction;

                document.getElementById("score")
                        .textContent =
                        "Spam Score: " + percentage + "%";

                const list =
                        document.getElementById("words");

                list.innerHTML = "";

                if (found.length === 0) {
                    list.innerHTML =
                            "<li>No suspicious words found.</li>";
                } else {
                    found.forEach(word => {
                        list.innerHTML +=
                                `<li>${word}</li>`;
                    });
                }

                document.getElementById("result")
                        .style.display = "block";
            }
        </script>

    </body>
</html>
