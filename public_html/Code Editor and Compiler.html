<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Code Editor and Compiler</title>
        <style>
            body{
                margin:0;
                font-family:Arial,sans-serif;
                background:#f4f6f9;
            }
            header{
                background:#2563eb;
                color:white;
                text-align:center;
                padding:20px;
            }
            .container{
                display:grid;
                grid-template-columns:1fr 1fr;
                gap:20px;
                padding:20px;
            }
            .editor{
                background:#fff;
                padding:20px;
                border-radius:15px;
                box-shadow:0 0 10px rgba(0,0,0,0.1);
            }
            textarea{
                width:100%;
                height:150px;
                padding:10px;
                margin-bottom:15px;
                resize:none;
                font-family:monospace;
            }
            button{
                padding:10px 20px;
                margin:5px;
                background:#2563eb;
                color:white;
                border:none;
                border-radius:8px;
                cursor:pointer;
            }
            iframe{
                width:100%;
                height:550px;
                border:none;
                background:white;
                border-radius:15px;
            }
        </style>
    </head>
    <body>

        <header>
            <h1>Code Editor and Compiler</h1>
        </header>

        <div class="container">

            <div class="editor">

                <h3>HTML</h3>
                <textarea id="htmlCode">
<h1>Hello World</h1>
                </textarea>

                <h3>CSS</h3>
                <textarea id="cssCode">
h1{
    color:blue;
    text-align:center;
}
                </textarea>

                <h3>JavaScript</h3>
                <textarea id="jsCode">
console.log("Hello");
                </textarea>

                <button onclick="runCode()">
                    Run
                </button>

                <button onclick="downloadCode()">
                    Download
                </button>

                <button onclick="clearCode()">
                    Clear
                </button>

            </div>

            <div>
                <iframe id="output"></iframe>
            </div>

        </div>

        <script>
            function runCode() {

                const html =
                        document.getElementById(
                                "htmlCode"
                                ).value;

                const css =
                        document.getElementById(
                                "cssCode"
                                ).value;

                const js =
                        document.getElementById(
                                "jsCode"
                                ).value;

                const output =
                        document.getElementById(
                                "output"
                                );

                const code =
                        `
                <html>
                <style>${css}</style>
                <body>
                ${html}
                <script>
                ${js}
                <\/script>
                </body>
                </html>
                `;

                output.srcdoc = code;
            }

            function downloadCode() {

                const html =
                        document.getElementById(
                                "htmlCode"
                                ).value;

                const css =
                        document.getElementById(
                                "cssCode"
                                ).value;

                const js =
                        document.getElementById(
                                "jsCode"
                                ).value;

                const code =
                        `
                <!DOCTYPE html>
                <html>
                <head>
                <style>${css}</style>
                </head>
                <body>
                ${html}
                <script>
                ${js}
                <\/script>
                </body>
                </html>
                `;

                const blob =
                        new Blob(
                                [code],
                                {type: "text/html"}
                        );

                const a =
                        document.createElement("a");

                a.href =
                        URL.createObjectURL(blob);

                a.download =
                        "project.html";

                a.click();
            }

            function clearCode() {

                document.getElementById(
                        "htmlCode"
                        ).value = "";

                document.getElementById(
                        "cssCode"
                        ).value = "";

                document.getElementById(
                        "jsCode"
                        ).value = "";

                document.getElementById(
                        "output"
                        ).srcdoc = "";
            }

            runCode();
        </script>

    </body>
</html>
