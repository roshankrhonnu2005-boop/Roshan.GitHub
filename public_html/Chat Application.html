\<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Chat Application</title>
        <style>
            body{
                margin:0;
                font-family:Arial,sans-serif;
                background:#e5ddd5;
                display:flex;
                justify-content:center;
                align-items:center;
                min-height:100vh;
            }
            .chat-container{
                width:500px;
                background:#fff;
                border-radius:15px;
                overflow:hidden;
                box-shadow:0 0 20px rgba(0,0,0,0.2);
            }
            .header{
                background:#075e54;
                color:#fff;
                padding:15px;
                text-align:center;
            }
            .messages{
                height:450px;
                overflow-y:auto;
                padding:15px;
                background:#efeae2;
            }
            .message{
                background:#dcf8c6;
                padding:10px;
                border-radius:10px;
                margin-bottom:10px;
            }
            .time{
                font-size:12px;
                color:#666;
            }
            .input-area{
                display:flex;
                padding:10px;
                background:#f0f0f0;
            }
            input{
                flex:1;
                padding:10px;
                border:1px solid #ccc;
                border-radius:8px;
            }
            button{
                margin-left:10px;
                padding:10px 20px;
                background:#128c7e;
                color:white;
                border:none;
                border-radius:8px;
                cursor:pointer;
            }
        </style>
    </head>
    <body>

        <div class="chat-container">
            <div class="header">
                <h2>Chat Application</h2>
            </div>

            <div class="messages" id="messages"></div>

            <div class="input-area">
                <input type="text" id="message"
                       placeholder="Type a message">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <script>
            let chats =
                    JSON.parse(localStorage.getItem("chats"))
                    || [];

            function displayMessages() {
                const container =
                        document.getElementById("messages");

                container.innerHTML = "";

                chats.forEach(chat => {
                    container.innerHTML += `
                <div class="message">
                    <strong>${chat.user}</strong><br>
                    ${chat.text}
                    <div class="time">${chat.time}</div>
                </div>
                `;
                });

                container.scrollTop =
                        container.scrollHeight;
            }

            function sendMessage() {
                const text =
                        document.getElementById("message")
                        .value.trim();

                if (text === "") {
                    return;
                }

                const now = new Date();

                chats.push({
                    user: "User",
                    text: text,
                    time: now.toLocaleTimeString()
                });

                localStorage.setItem(
                        "chats",
                        JSON.stringify(chats)
                        );

                document.getElementById("message")
                        .value = "";

                displayMessages();
            }

            displayMessages();
        </script>

    </body>
</html>
