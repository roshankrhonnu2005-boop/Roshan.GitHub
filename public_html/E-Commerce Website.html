<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>E-Commerce Website</title>
        <style>
            body{
                font-family:Arial,sans-serif;
                background:#f4f6f9;
                margin:0;
            }
            header{
                background:#2563eb;
                color:#fff;
                padding:20px;
                text-align:center;
            }
            .container{
                display:grid;
                grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
                gap:20px;
                padding:30px;
            }
            .card{
                background:#fff;
                border-radius:15px;
                padding:20px;
                text-align:center;
                box-shadow:0 0 10px rgba(0,0,0,0.1);
            }
            .card img{
                width:180px;
                height:180px;
                object-fit:cover;
            }
            button{
                padding:10px 15px;
                background:#2563eb;
                color:#fff;
                border:none;
                border-radius:8px;
                cursor:pointer;
            }
            .cart{
                background:#fff;
                margin:20px;
                padding:20px;
                border-radius:15px;
                box-shadow:0 0 10px rgba(0,0,0,0.1);
            }
        </style>
    </head>
    <body>

        <header>
            <h1>E-Commerce Website</h1>
        </header>

        <div class="container" id="products"></div>

        <div class="cart">
            <h2>Shopping Cart</h2>
            <div id="cartItems"></div>
            <h3 id="total">Total: ₹0</h3>
        </div>

        <script>
            const products = [
                {
                    id: 1,
                    name: "Laptop",
                    price: 50000,
                    image: "https://picsum.photos/200?random=1"
                },
                {
                    id: 2,
                    name: "Headphones",
                    price: 3000,
                    image: "https://picsum.photos/200?random=2"
                },
                {
                    id: 3,
                    name: "Smartphone",
                    price: 25000,
                    image: "https://picsum.photos/200?random=3"
                },
                {
                    id: 4,
                    name: "Smart Watch",
                    price: 7000,
                    image: "https://picsum.photos/200?random=4"
                }
            ];

            let cart =
                    JSON.parse(localStorage.getItem("cart"))
                    || [];

            function displayProducts() {
                const container =
                        document.getElementById("products");

                products.forEach(product => {
                    container.innerHTML += `
                <div class="card">
                    <img src="${product.image}">
                    <h3>${product.name}</h3>
                    <p>₹${product.price}</p>
                    <button onclick="addToCart(${product.id})">
                        Add to Cart
                    </button>
                </div>
                `;
                });
            }

            function addToCart(id) {
                const item =
                        products.find(p => p.id === id);

                const existing =
                        cart.find(c => c.id === id);

                if (existing) {
                    existing.quantity++;
                } else {
                    cart.push({
                        ...item,
                        quantity: 1
                    });
                }

                localStorage.setItem(
                        "cart",
                        JSON.stringify(cart)
                        );

                displayCart();
            }

            function displayCart() {
                const cartDiv =
                        document.getElementById("cartItems");

                cartDiv.innerHTML = "";

                let total = 0;

                cart.forEach(item => {
                    total += item.price * item.quantity;

                    cartDiv.innerHTML += `
                <p>
                    ${item.name}
                    (${item.quantity})
                    - ₹${item.price * item.quantity}
                </p>
                `;
                });

                document.getElementById("total")
                        .textContent =
                        "Total: ₹" + total;
            }

            displayProducts();
            displayCart();
        </script>

    </body>
</html>
