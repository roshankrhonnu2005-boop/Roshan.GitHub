<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>URL Shortener</title>
        <style>
            body{
                font-family:Arial,sans-serif;
                background:linear-gradient(135deg,#2563eb,#7c3aed);
                min-height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                margin:0;
            }
            .container{
                width:700px;
                background:#fff;
                padding:30px;
                border-radius:20px;
                box-shadow:0 15px 30px rgba(0,0,0,0.2);
            }
            h1{
                text-align:center;
            }
            input{
                width:100%;
                padding:12px;
                margin:10px 0;
                border:1px solid #ccc;
                border-radius:8px;
                box-sizing:border-box;
            }
            button{
                padding:12px 20px;
                background:#2563eb;
                color:#fff;
                border:none;
                border-radius:8px;
                cursor:pointer;
            }
            table{
                width:100%;
                margin-top:20px;
                border-collapse:collapse;
            }
            th,td{
                border:1px solid #ddd;
                padding:10px;
                text-align:center;
            }
            th{
                background:#2563eb;
                color:white;
            }
            .short{
                color:#2563eb;
                cursor:pointer;
            }
        </style>
    </head>
    <body>

        <div class="container">
            <h1>URL Shortener</h1>

            <input type="text"
                   id="longUrl"
                   placeholder="Enter a long URL">

            <button onclick="shortenUrl()">
                Shorten URL
            </button>

            <table>
                <thead>
                    <tr>
                        <th>Original URL</th>
                        <th>Short URL</th>
                        <th>Clicks</th>
                    </tr>
                </thead>
                <tbody id="urlTable"></tbody>
            </table>
        </div>

        <script>
            let urls =
                    JSON.parse(localStorage.getItem("shortUrls"))
                    || [];

            function generateCode() {
                return Math.random()
                        .toString(36)
                        .substring(2, 8);
            }

            function shortenUrl() {
                const longUrl =
                        document.getElementById("longUrl")
                        .value.trim();

                if (longUrl === "") {
                    alert("Enter a URL.");
                    return;
                }

                const code = generateCode();

                urls.push({
                    original: longUrl,
                    short: code,
                    clicks: 0
                });

                localStorage.setItem(
                        "shortUrls",
                        JSON.stringify(urls)
                        );

                document.getElementById("longUrl")
                        .value = "";

                displayUrls();
            }

            function displayUrls() {
                const table =
                        document.getElementById("urlTable");

                table.innerHTML = "";

                urls.forEach((url, index) => {
                    table.innerHTML += `
                <tr>
                    <td>${url.original}</td>
                    <td>
                        <span class="short"
                        onclick="openUrl(${index})">
                        short.ly/${url.short}
                        </span>
                    </td>
                    <td>${url.clicks}</td>
                </tr>
                `;
                });
            }

            function openUrl(index) {
                urls[index].clicks++;

                localStorage.setItem(
                        "shortUrls",
                        JSON.stringify(urls)
                        );

                displayUrls();

                window.open(
                        urls[index].original,
                        "_blank"
                        );
            }

            displayUrls();
        </script>

    </body>
</html>
