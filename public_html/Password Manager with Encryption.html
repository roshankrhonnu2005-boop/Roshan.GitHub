<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Password Manager</title>
        <style>
            body{
                font-family:Arial,sans-serif;
                background:#f4f6f9;
                padding:30px;
            }
            .container{
                max-width:900px;
                margin:auto;
                background:#fff;
                padding:30px;
                border-radius:15px;
                box-shadow:0 0 15px rgba(0,0,0,0.1);
            }
            h1{
                text-align:center;
            }
            input{
                width:30%;
                padding:12px;
                margin:5px;
            }
            button{
                padding:12px 20px;
                margin:5px;
                background:#2563eb;
                color:white;
                border:none;
                border-radius:8px;
                cursor:pointer;
            }
            table{
                width:100%;
                margin-top:20px;
                border-collapse:collapse;
            }
            th,td{
                border:1px solid #ddd;
                padding:12px;
                text-align:center;
            }
            th{
                background:#2563eb;
                color:white;
            }
        </style>
    </head>
    <body>

        <div class="container">
            <h1>Password Manager</h1>

            <input type="text" id="website" placeholder="Website">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">

            <br>

            <button onclick="generatePassword()">
                Generate Password
            </button>

            <button onclick="savePassword()">
                Save
            </button>

            <br>

            <input type="text"
                   id="search"
                   placeholder="Search Website"
                   onkeyup="searchPasswords()">

            <table>
                <thead>
                    <tr>
                        <th>Website</th>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="passwordTable"></tbody>
            </table>
        </div>

        <script>
            let passwords =
                    JSON.parse(localStorage.getItem("passwords"))
                    || [];

            function generatePassword() {
                const chars =
                        "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&";

                let pass = "";

                for (let i = 0; i < 12; i++) {
                    pass += chars.charAt(
                            Math.floor(
                                    Math.random() *
                                    chars.length
                                    )
                            );
                }

                document.getElementById(
                        "password"
                        ).value = pass;
            }

            function savePassword() {

                const website =
                        document.getElementById(
                                "website"
                                ).value.trim();

                const username =
                        document.getElementById(
                                "username"
                                ).value.trim();

                const password =
                        document.getElementById(
                                "password"
                                ).value.trim();

                if (
                        website === "" ||
                        username === "" ||
                        password === ""
                        ) {
                    alert("Fill all fields.");
                    return;
                }

                passwords.push({
                    website,
                    username,
                    password
                });

                localStorage.setItem(
                        "passwords",
                        JSON.stringify(passwords)
                        );

                document.getElementById(
                        "website"
                        ).value = "";

                document.getElementById(
                        "username"
                        ).value = "";

                document.getElementById(
                        "password"
                        ).value = "";

                displayPasswords();
            }

            function displayPasswords(
                    data = passwords
                    ) {
                const table =
                        document.getElementById(
                                "passwordTable"
                                );

                table.innerHTML = "";

                data.forEach(
                        (item, index) => {
                    table.innerHTML += `
                <tr>
                    <td>${item.website}</td>
                    <td>${item.username}</td>
                    <td>${item.password}</td>
                    <td>
                        <button
                        onclick="deletePassword(${index})">
                        Delete
                        </button>
                    </td>
                </tr>
                `;
                });
            }

            function deletePassword(index) {
                passwords.splice(index, 1);

                localStorage.setItem(
                        "passwords",
                        JSON.stringify(passwords)
                        );

                displayPasswords();
            }

            function searchPasswords() {
                const value =
                        document.getElementById(
                                "search"
                                )
                        .value
                        .toLowerCase();

                const filtered =
                        passwords.filter(
                                p =>
                            p.website
                                    .toLowerCase()
                                    .includes(value)
                        );

                displayPasswords(filtered);
            }

            displayPasswords();
        </script>

    </body>
</html>
