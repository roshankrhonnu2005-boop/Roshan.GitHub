<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Student Management System</title>
        <style>
            body{
                font-family:Arial;
                background:#f4f6f9;
                padding:20px;
            }
            .container{
                max-width:900px;
                margin:auto;
                background:white;
                padding:20px;
                border-radius:10px;
                box-shadow:0 0 10px rgba(0,0,0,0.1);
            }
            h1{
                text-align:center;
            }
            input{
                width:23%;
                padding:10px;
                margin:5px;
            }
            button{
                padding:10px 15px;
                cursor:pointer;
            }
            table{
                width:100%;
                border-collapse:collapse;
                margin-top:20px;
            }
            th,td{
                border:1px solid #ddd;
                padding:10px;
                text-align:center;
            }
            th{
                background:#2563eb;
                color:white;
            }
            #search{
                width:50%;
                margin-top:20px;
            }
        </style>
    </head>
    <body>

        <div class="container">
            <h1>Student Management System</h1>

            <input type="text" id="name" placeholder="Student Name">
            <input type="text" id="roll" placeholder="Roll Number">
            <input type="text" id="course" placeholder="Course">
            <input type="number" id="marks" placeholder="Marks">

            <button onclick="addStudent()">Add Student</button>

            <br>

            <input type="text" id="search" placeholder="Search by Name or Roll Number" onkeyup="searchStudent()">

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Roll No</th>
                        <th>Course</th>
                        <th>Marks</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="studentTable"></tbody>
            </table>
        </div>

        <script>
            let students = JSON.parse(localStorage.getItem("students")) || [];

            function displayStudents(data = students) {
                const table = document.getElementById("studentTable");
                table.innerHTML = "";

                data.forEach((student, index) => {
                    table.innerHTML += `
                <tr>
                    <td>${student.name}</td>
                    <td>${student.roll}</td>
                    <td>${student.course}</td>
                    <td>${student.marks}</td>
                    <td>
                        <button onclick="deleteStudent(${index})">Delete</button>
                    </td>
                </tr>
                `;
                });
            }

            function addStudent() {
                const name = document.getElementById("name").value;
                const roll = document.getElementById("roll").value;
                const course = document.getElementById("course").value;
                const marks = document.getElementById("marks").value;

                if (name === "" || roll === "" || course === "" || marks === "") {
                    alert("Please fill all fields");
                    return;
                }

                students.push({
                    name,
                    roll,
                    course,
                    marks
                });

                localStorage.setItem("students", JSON.stringify(students));

                document.getElementById("name").value = "";
                document.getElementById("roll").value = "";
                document.getElementById("course").value = "";
                document.getElementById("marks").value = "";

                displayStudents();
            }

            function deleteStudent(index) {
                students.splice(index, 1);
                localStorage.setItem("students", JSON.stringify(students));
                displayStudents();
            }

            function searchStudent() {
                const value = document.getElementById("search").value.toLowerCase();

                const filtered = students.filter(student =>
                    student.name.toLowerCase().includes(value) ||
                            student.roll.toLowerCase().includes(value)
                );

                displayStudents(filtered);
            }

            displayStudents();
        </script>

    </body>
</html>
