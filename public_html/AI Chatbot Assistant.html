<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI Chatbot Assistant</title>

        <style>
            body{
                margin:0;
                font-family:Arial,sans-serif;
                background:#f4f6f9;
                display:flex;
                justify-content:center;
                align-items:center;
                min-height:100vh;
            }

            .container{
                width:550px;
                background:#fff;
                border-radius:20px;
                overflow:hidden;
                box-shadow:0 0 20px rgba(0,0,0,0.2);
            }

            .header{
                background:#2563eb;
                color:white;
                text-align:center;
                padding:20px;
            }

            .chat{
                height:500px;
                overflow-y:auto;
                padding:15px;
                background:#eef2ff;
            }

            .user,
            .bot{
                max-width:80%;
                padding:12px;
                margin-bottom:15px;
                border-radius:12px;
            }

            .user{
                background:#2563eb;
                color:white;
                margin-left:auto;
            }

            .bot{
                background:white;
                border:1px solid #ddd;
            }

            .time{
                font-size:11px;
                margin-top:5px;
            }

            .input-area{
                display:flex;
                padding:10px;
            }

            input{
                flex:1;
                padding:12px;
                border:1px solid #ccc;
                border-radius:8px;
            }

            button{
                padding:12px 20px;
                margin-left:10px;
                border:none;
                background:#2563eb;
                color:white;
                border-radius:8px;
                cursor:pointer;
            }

            .actions{
                text-align:center;
                padding-bottom:15px;
            }
        </style>
    </head>
    <body>

        <div class="container">

            <div class="header">
                <h2>AI Chatbot Assistant</h2>
            </div>

            <div id="chat" class="chat"></div>

            <div class="input-area">
                <input
                    type="text"
                    id="message"
                    placeholder="Type a message"
                    >

                <button onclick="sendMessage()">
                    Send
                </button>
            </div>

            <div class="actions">
                <button onclick="clearChat()">
                    Delete Conversation
                </button>
            </div>

        </div>

        <script>
            const API_KEY =
                    "PASTE_YOUR_GEMINI_API_KEY";

            let chats =
                    JSON.parse(
                            localStorage.getItem(
                                    "geminiChats"
                                    )
                            ) || [];

            function displayMessages() {

                const chat =
                        document.getElementById(
                                "chat"
                                );

                chat.innerHTML = "";

                chats.forEach(msg => {

                    chat.innerHTML += `
                <div class="${msg.type}">
                    ${msg.text}
                    <div class="time">
                        ${msg.time}
                    </div>
                </div>
                `;
                });

                chat.scrollTop =
                        chat.scrollHeight;
            }

            function addMessage(type, text) {

                chats.push({
                    type: type,
                    text: text,
                    time: new Date()
                            .toLocaleTimeString()
                });

                localStorage.setItem(
                        "geminiChats",
                        JSON.stringify(chats)
                        );

                displayMessages();
            }

            async function getReply(message) {

                try {

                    const response =
                            await fetch(
                                    "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="
                                    + API_KEY,
                                    {
                                        method: "POST",
                                        headers: {
                                            "Content-Type":
                                                    "application/json"
                                        },
                                        body: JSON.stringify({
                                            contents: [
                                                {
                                                    parts: [
                                                        {
                                                            text: message
                                                        }
                                                    ]
                                                }
                                            ]
                                        })
                                    }
                            );

                    const data =
                            await response.json();

                    return data
                            .candidates[0]
                            .content.parts[0]
                            .text;

                } catch {

                    return "Unable to connect to AI service.";
                }
            }

            async function sendMessage() {

                const input =
                        document.getElementById(
                                "message"
                                );

                const text =
                        input.value.trim();

                if (text === "") {
                    return;
                }

                addMessage(
                        "user",
                        text
                        );

                input.value = "";

                addMessage(
                        "bot",
                        "Thinking..."
                        );

                const reply =
                        await getReply(text);

                chats.pop();

                addMessage(
                        "bot",
                        reply
                        );
            }

            function clearChat() {

                if (
                        confirm(
                                "Delete all conversations?"
                                )
                        ) {
                    chats = [];

                    localStorage.removeItem(
                            "geminiChats"
                            );

                    displayMessages();
                }
            }

            document
                    .getElementById(
                            "message"
                            )
                    .addEventListener(
                            "keypress",
                            function (e) {

                                if (e.key === "Enter") {
                                    sendMessage();
                                }
                            }
                    );

            displayMessages();
        </script>

    </body>
</html>
